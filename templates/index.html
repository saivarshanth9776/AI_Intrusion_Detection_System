<!DOCTYPE html>
<html>

<head>

    <title>AI Intrusion Detection System</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-dark text-light">

<div class="container mt-5">

    <div class="card p-4 shadow-lg">

        <h1 class="text-center mb-4">
            AI Intrusion Detection System
        </h1>

        <form action="/predict" method="post">

    <input type="text" name="feature1" class="form-control mb-3" placeholder="Feature 1" required>

    <input type="text" name="feature2" class="form-control mb-3" placeholder="Feature 2" required>

    <input type="text" name="feature3" class="form-control mb-3" placeholder="Feature 3" required>

    <input type="text" name="feature4" class="form-control mb-3" placeholder="Feature 4" required>

    <input type="text" name="feature5" class="form-control mb-3" placeholder="Feature 5" required>

    <button type="submit" class="btn btn-primary w-100">
        Detect Attack
    </button>

</form>

        <h3 class="text-center mt-4">
            {{ prediction_text }}
        </h3>

    </div>

</div>

</body>
</html>
